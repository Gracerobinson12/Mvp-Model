<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">

  <!-- Red background full bleed -->
  <rect width="1200" height="400" fill="#ff3b30"/>

  <!-- GRAT white -->
  <text
    x="60"
    y="250"
    font-family="'Arial Black','Arial Narrow',Arial,sans-serif"
    font-size="180"
    font-weight="900"
    fill="white"
    letter-spacing="-8">GRAT</text>

  <!-- IA dark navy -->
  <text
    x="554"
    y="250"
    font-family="'Arial Black','Arial Narrow',Arial,sans-serif"
    font-size="180"
    font-weight="900"
    fill="#1a1a2e"
    letter-spacing="-8">IA</text>

  <!-- space + CORE white thin -->
  <text
    x="720"
    y="250"
    font-family="Arial,sans-serif"
    font-size="180"
    font-weight="100"
    fill="rgba(255,255,255,0.85)"
    letter-spacing="-8"> CORE</text>

  <!-- Thin divider -->
  <line x1="60" y1="278" x2="1140" y2="278" stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>

  <!-- Tagline -->
  <text
    x="60"
    y="330"
    font-family="Arial,sans-serif"
    font-size="22"
    font-weight="400"
    fill="rgba(255,255,255,0.6)"
    letter-spacing="10">BUSINESS INTELLIGENCE AGENCY</text>

</svg>
